<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}ZenDoc{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .mise-en-page {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* Sidebar fixe : reste visible même si le contenu défile */
        .sidebar-app {
            position: sticky !important;
            top: 0 !important;
            left: auto !important;
            align-self: flex-start;
            flex-shrink: 0;
            width: 280px;
            height: 100vh;
            overflow-y: auto;
        }

        .contenu-page {
            flex: 1 1 auto;
            min-width: 0;
            width: 100%;
            padding: 32px;
            overflow-x: hidden;
            background: #F8F9FC;
        }

        @media (max-width: 900px) {
            .mise-en-page { flex-direction: column; }
            .sidebar-app { position: relative !important; top: auto !important; width: 100%; height: auto; }
            .contenu-page { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="overlay-chargement" id="overlay-chargement">
        <div class="spinner-ia"></div>
        <p class="texte-chargement">🤖 L'IA analyse votre demande...</p>
    </div>

    <div class="toast-conteneur" id="toast-conteneur">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="toast-perso {{ 'succes' if category == 'success' else 'erreur' }}">
                    <span class="icone">{{ '✅' if category == 'success' else '❌' }}</span>
                    <span class="texte">{{ message }}</span>
                    <span class="fermer" onclick="this.parentElement.remove()">×</span>
                </div>
            {% endfor %}
        {% endwith %}
    </div>

    <div class="mise-en-page">
        {% include "navbar.html" %}
        <main class="contenu-page">
            {% block contenu %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const formulaires = document.querySelectorAll('form[data-chargement]');
            formulaires.forEach(function (form) {
                form.addEventListener('submit', function () {
                    document.getElementById('overlay-chargement').classList.add('actif');
                });
            });

            const toasts = document.querySelectorAll('.toast-perso');
            toasts.forEach(function (toast, index) {
                setTimeout(function () {
                    toast.classList.add('disparait');
                    setTimeout(function () { toast.remove(); }, 300);
                }, 4000 + (index * 300));
            });
        });
    </script>
</body>
</html>
